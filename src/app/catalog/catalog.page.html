<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Catálogo Mueblexi</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <ion-card *ngFor="let producto of productos" style="margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    
    <img [src]="producto.imagen" [alt]="producto.nombre" style="width: 100%; height: 200px; object-fit: cover;" />
    
    <ion-card-header>
      <ion-card-title style="font-weight: bold; font-size: 1.2rem;">{{ producto.nombre }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <h2 style="color: #2dd36f; font-weight: bold; font-size: 1.5rem; margin-top: 0;">
        {{ producto.precio_total | currency:'MXN' }}
      </h2>
      
      <ion-button expand="block" color="tertiary" class="ion-margin-top">
        Ver Detalles
      </ion-button>
    </ion-card-content>

  </ion-card>

</ion-content>
