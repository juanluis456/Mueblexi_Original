<ion-app>
  <ion-menu contentId="main-content" type="overlay">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Menú Mueblexi</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/catalog" routerDirection="root" lines="none">
            <ion-icon slot="start" name="storefront-outline"></ion-icon>
            <ion-label>Catálogo de Muebles</ion-label>
          </ion-item>

          <ion-item routerLink="/payment-history" routerDirection="root" lines="none">
            <ion-icon slot="start" name="wallet-outline"></ion-icon>
            <ion-label>Mis Compras</ion-label>
          </ion-item>

          <ion-item routerLink="/home" routerDirection="root" lines="none" style="margin-top: 20px;">
            <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>
            <ion-label color="danger">Cerrar Sesión</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
