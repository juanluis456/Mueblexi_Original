<ion-header>
  <ion-toolbar style="--background: #ff7f00; color: white;">
    <ion-buttons slot="start">
      <ion-menu-button style="color: white;"></ion-menu-button>
    </ion-buttons>
    <ion-title style="font-weight: bold;">Registrar Abono</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #1e1e1e;" class="ion-padding">

  <div style="text-align: center; margin-bottom: 20px;">
    <h2 style="font-weight: bold; color: #ffffff;">Nuevo Abono</h2>
    <p style="color: #bbbbbb;">Ingresa los datos del pago presencial</p>
  </div>

  <ion-card style="background: #2a2a2a; border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
    <ion-card-content>
      
      <ion-item style="--background: transparent;" lines="full">
        <ion-label position="stacked" style="font-weight: bold; color: #aaaaaa;">Nombre del Cliente</ion-label>
        <ion-input type="text" placeholder="Ej. Juan Pérez" [(ngModel)]="nombreCliente" style="color: #ffffff;"></ion-input>
      </ion-item>

      <ion-item style="--background: transparent;" lines="full">
        <ion-label position="stacked" style="font-weight: bold; color: #aaaaaa;">Producto Asociado</ion-label>
        <ion-input type="text" placeholder="Ej. Sala Esquinera" [(ngModel)]="nombreProducto" style="color: #ffffff;"></ion-input>
      </ion-item>

      <ion-item style="--background: transparent;" lines="full">
        <ion-label position="stacked" style="font-weight: bold; color: #aaaaaa;">Monto del Abono ($)</ion-label>
        <ion-input type="number" placeholder="0.00" [(ngModel)]="montoAbono" style="color: #2dd36f; font-weight: bold; font-size: 1.2rem;"></ion-input>
      </ion-item>

      <ion-item style="--background: transparent;" lines="full">
        <ion-label position="stacked" style="font-weight: bold; color: #aaaaaa;">Fecha del Pago</ion-label>
        <ion-datetime-button datetime="datetime" style="margin-top: 10px;"></ion-datetime-button>
        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime id="datetime" presentation="date" [(ngModel)]="fechaAbono"></ion-datetime>
          </ng-template>
        </ion-modal>
      </ion-item>

      <ion-button expand="block" class="ion-margin-top" style="--background: #6a0dad; margin-top: 30px; font-weight: bold; color: white;" (click)="guardarAbono()">
        Registrar Abono
      </ion-button>

    </ion-card-content>
  </ion-card>

</ion-content>
